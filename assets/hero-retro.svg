      <tspan x="96" dy="44">██╔══██╗██║     ██║         ╚══██╔══╝██║  ██║██╔════╝</tspan>
      <tspan x="96" dy="44">███████║██║     ██║            ██║   ███████║█████╗  </tspan>
      <tspan x="96" dy="44">██╔══██║██║     ██║            ██║   ██╔══██║██╔══╝  </tspan>
      <tspan x="96" dy="44">██║  ██║███████╗███████╗       ██║   ██║  ██║███████╗</tspan>
      <tspan x="96" dy="44">╚═╝  ╚═╝╚══════╝╚══════╝       ╚═╝   ╚═╝  ╚═╝╚══════╝</tspan>
    </text>

    <text x="96" y="532" font-size="34" xml:space="preserve" fill="url(#textGlow)" filter="url(#glow)">
      <tspan x="96" dy="0">██╗   ██╗██╗██████╗ ███████╗███████╗</tspan>
      <tspan x="96" dy="44">██║   ██║██║██╔══██╗██╔════╝██╔════╝</tspan>
      <tspan x="96" dy="44">██║   ██║██║██████╔╝█████╗  ███████╗</tspan>
      <tspan x="96" dy="44">╚██╗ ██╔╝██║██╔══██╗██╔══╝  ╚════██║</tspan>
      <tspan x="96" dy="44"> ╚████╔╝ ██║██████╔╝███████╗███████║</tspan>
      <tspan x="96" dy="44">  ╚═══╝  ╚═╝╚═════╝ ╚══════╝╚══════╝</tspan>
    </text>

    <text x="930" y="532" font-size="34" xml:space="preserve" fill="url(#textGlow)" filter="url(#glow)">
      <tspan x="930" dy="0">██████╗    ██████╗ </tspan>
      <tspan x="930" dy="44">╚════██╗  ██╔═████╗</tspan>
      <tspan x="930" dy="44"> █████╔╝  ██║██╔██║</tspan>
      <tspan x="930" dy="44">██╔═══╝   ████╔╝██║</tspan>
      <tspan x="930" dy="44">███████╗██╔██████╔╝</tspan>
      <tspan x="930" dy="44">╚══════╝╚═╝╚═════╝ </tspan>
    </text>

    <text x="110" y="824" font-size="28" fill="#fff8d6">One command. Full agentic coding setup. Maximum tasteful chaos.</text>
  </g>
</svg>