<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">ATV — All The Vibes 2.0 Starter Kit</title>
  <desc id="desc">Retro terminal style ASCII art hero for the All The Vibes 2.0 Starter Kit README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120d08" />
      <stop offset="55%" stop-color="#1f1408" />
      <stop offset="100%" stop-color="#0d0b09" />
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#facc15" />
    </linearGradient>
    <linearGradient id="textGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="45%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="4" fill="rgba(255,255,255,0.02)" />
      <rect y="4" width="8" height="4" fill="rgba(0,0,0,0.06)" />
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="920" fill="url(#bg)" rx="32" />
  <rect width="1400" height="920" fill="url(#scanlines)" rx="32" opacity="0.45" />
  <rect x="32" y="32" width="1336" height="856" rx="24" fill="none" stroke="url(#frame)" stroke-width="3" opacity="0.9" />
  <rect x="64" y="68" width="1272" height="784" rx="18" fill="rgba(255,255,255,0.02)" stroke="rgba(250,204,21,0.18)" />
  <rect x="84" y="784" width="1232" height="64" rx="16" fill="rgba(9,7,5,0.86)" stroke="rgba(250,204,21,0.28)" />
  <rect x="96" y="796" width="1208" height="40" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" />

  <g font-family="'Cascadia Code', 'JetBrains Mono', Consolas, monospace">
