version: 2

project_name: atv-installer

builds:
  - main: .
    binary: atv-installer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: All-The-Vibes
    name: ATV-StarterKit
  draft: false
  prerelease: auto
  header: |
    ## ATV {{ .Version }}

    See [CHANGELOG.md](https://github.com/All-The-Vibes/ATV-StarterKit/blob/main/CHANGELOG.md) for full details.
  extra_files:
    - glob: .github/release-notes.md
